spring:
  cloud:
    stream:
      bindings:
        input-0:
          binder: solace
          # Solace destination is generated by PubSubPlusExtension
        output-0:
          binder: simple-queuing
          destination: target-destination
        input-1:
          binder: simple-queuing
          destination: source-destination
        output-1:
          binder: solace
          # Solace destination is generated by PubSubPlusExtension
      solace:
        default:
          producer:
            destination-type: queue
      simple-queuing:
        default:
          consumer:
            polling-interval: 200

solace:
  connector:
    workflows:
      0:
        enabled: false
      1:
        enabled: false

logging:
  level:
    root: info
    com.solace.connector.jms: TRACE
    com.solace.connector.core: DEBUG
    com.solace.spring.cloud.stream.binder: DEBUG