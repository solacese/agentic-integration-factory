# simple-queuing:
#  base-url: <injected from @DynamicPropertySource>
spring:
  cloud:
    function:
      definition: "testConsumer"
    stream:
      bindings:
        testConsumer-in-0:
          destination: source-destination
          binder: simple-queuing
          group: test-group
        testSupplier-out-0:
          destination: target-destination
          binder: simple-queuing
          producer:
            error-channel-enabled: true
            use-native-encoding: true  # Preserve payload format without conversion
      simple-queuing:
        default:
          consumer:
            polling-interval: 1000
management:
  endpoint:
    health:
      show-components: always
      show-details: always
  endpoints:
    web:
      exposure:
        include: 'health'
  health:
    binders:
      enabled: true

# Logging configuration for tests
logging:
  level:
    root: INFO
    com.solace.samples.binder.simplequeuing: DEBUG
