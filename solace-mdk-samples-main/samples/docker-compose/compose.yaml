services:
  simple-queuing-service:
    image: simple-queuing-service:1.0.0-SNAPSHOT
    ports: 
      - "8088:8088"  
    healthcheck:
      test: wget -q -O - http://user:pass@localhost:8088/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  solace-broker:
    image: solace/solace-pubsub-standard:latest
    volumes:
      - "storage-group:/var/lib/solace"
    shm_size: 1g
    ulimits:
      core: -1
      nofile:
        soft: 2448
        hard: 1048576
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 1
    ports:
      #Web transport
      - '8008:8008'
      #SEMP / PubSub+ Manager
      - '8080:8080'
      #REST Default VPN
      - '9000:9000'
      #SMF
      - '55554:55555'
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
      - system_scaling_maxconnectioncount=100
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--user", "admin:admin", "http://localhost:8080/SEMP"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  destination-initializer:
    image: curlimages/curl:latest
    depends_on:
      solace-broker:
        condition: service_healthy
    command: > 
      sh -c "
        sleep 5 &&
        curl -s -X POST -u admin:admin http://solace-broker:8080/SEMP/v2/config/msgVpns/default/queues -H 'Content-Type: application/json' -d '{\"queueName\":\"Solace/Queue/0\", \"egressEnabled\": true, \"ingressEnabled\": true, \"owner\": \"default\"}' &&
        curl -s -X POST -u admin:admin http://solace-broker:8080/SEMP/v2/config/msgVpns/default/queues -H 'Content-Type: application/json' -d '{\"queueName\":\"Solace/Queue/1\", \"egressEnabled\": true, \"ingressEnabled\": true, \"owner\": \"default\"}' &&
        curl -s -X POST http://simple-queuing-service:8088/destinations -H 'Content-Type: application/json' -d '{\"name\": \"source-destination\"}' &&
        curl -s -X POST http://simple-queuing-service:8088/destinations -H 'Content-Type: application/json' -d '{\"name\": \"target-destination\"}'"

  micro-integration-sample:
    image: company/microintegration-sample:1.0.0-SNAPSHOT
    volumes: 
      - type: bind
        source: ./mi-config/
        target: /app/external/spring/config/
        read_only: true
    ports:
      - "8090:8090"
    depends_on:
      simple-queuing-service:
        condition: service_healthy
      solace-broker:
        condition: service_healthy
      destination-initializer:
        condition: service_completed_successfully

volumes:
  storage-group:
