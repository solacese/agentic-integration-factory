services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spec2event
      POSTGRES_USER: spec2event
      POSTGRES_PASSWORD: spec2event
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

