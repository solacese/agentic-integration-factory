services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spec2event
      POSTGRES_USER: spec2event
      POSTGRES_PASSWORD: spec2event
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: __API_IMAGE__
    restart: unless-stopped
    env_file:
      - /opt/spec2event/api.env
    volumes:
      - /opt/spec2event/generated-runs:/workspace/generated-runs
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres

  web:
    image: __WEB_IMAGE__
    restart: unless-stopped
    env_file:
      - /opt/spec2event/web.env
    depends_on:
      - api

  proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/spec2event/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
